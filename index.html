<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashScout - Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 520px;
            width: 100%;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 3rem;
        }

        .logo span {
            color: #10b981;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        h1 .highlight {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: #94a3b8;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        form {
            display: flex;
            gap: 0.5rem;
        }

        input[type="email"] {
            flex: 1;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="email"]::placeholder {
            color: #64748b;
        }

        input[type="email"]:focus {
            border-color: #10b981;
        }

        button {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #0b0f1a;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(16,185,129,0.3);
        }

        .msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.2rem;
        }

        .msg.success { color: #10b981; }
        .msg.error { color: #ef4444; }

        .footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #475569;
        }

        @media (max-width: 480px) {
            form { flex-direction: column; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Hash<span>Scout</span></div>
        <h1>Coming <span class="highlight">Soon</span></h1>
        <p>We're building something powerful. Leave your email and be the first to know when we launch.</p>
        <form id="signup" action="https://formspree.io/f/xkopajlp" method="POST">
            <input type="email" name="email" placeholder="Your email address" required>
            <button type="submit">Notify Me</button>
        </form>
        <div class="msg" id="msg"></div>
        <div class="footer">&copy; 2026 HashScout</div>
    </div>

    <script>
        const form = document.getElementById('signup');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = form.email.value.trim();
            if (!email) return;

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (res.ok) {
                    msg.textContent = '✓ You\'re on the list! We\'ll be in touch.';
                    msg.className = 'msg success';
                    form.email.value = '';
                } else {
                    msg.textContent = 'Something went wrong. Please try again.';
                    msg.className = 'msg error';
                }
            } catch {
                msg.textContent = 'Network error. Please try again.';
                msg.className = 'msg error';
            }
        });
    </script>
</body>
</html>
